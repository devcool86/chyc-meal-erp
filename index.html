<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0F1B42">
<title>CHYC-MEAL ERP Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0F1B42;--navy2:#1A2A5E;--gold:#B8972A;--bg:#EEF2FA;--card:#fff;--ok:#10B981;--err:#EF4444;--r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--navy);min-height:100vh}
.hdr{background:linear-gradient(135deg,var(--navy),var(--navy2));padding:15px;display:flex;justify-content:space-between;align-items:center;color:#fff;box-shadow:0 3px 15px rgba(0,0,0,0.2)}
.sync-btn{font-size:11px;font-weight:700;padding:8px 15px;border-radius:20px;border:none;background:#334155;color:#fff;cursor:pointer;}
.sync-btn.ok{background:var(--ok)}.sync-btn.loading{background:var(--gold)}
.
