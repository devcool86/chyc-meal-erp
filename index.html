<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>CHYC-MEAL ERP v3.7</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--navy:#0F1B42;--navy2:#1A2A5E;--gold:#B8972A;--bg:#F4F7FE;--card:#ffffff;--ok:#10B981;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--navy);padding-bottom:40px}
.hdr{background:linear-gradient(135deg,var(--navy),var(--navy2));padding:15px 20px;display:flex;justify-content:space-between;align-items:center;color:#fff;position:sticky;top:0;z-index:100;box-shadow:0 4px 10px rgba(0,0,0,0.1)}
.btn-group{display:flex;gap:5px}
.action-btn{border:none;padding:10px 12px;border-radius:25px;font-weight:700;cursor:pointer;font-size:10px;text-decoration:none;display:inline-flex;align-items:center;color:#fff;transition:0.3s}
.action-btn:active{transform:scale(0.9)}
.btn-sync{background:var(--gold);color:var(--navy)}
.btn-pdf{background:#6E8CB5}
.btn-kobo{background:var(--ok)}
.filter-section{background:var(--navy2);padding:15px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
select{background:rgba(255,255,255,0.15);color:#fff;border:1px solid var(--gold);padding:10px;border-radius:8px;font-size:11px;width:100%;outline:none}
.main{padding:15px;max-width:1100px;margin:0 auto}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(130px, 1fr));gap:12px;margin-bottom:20px}
.kpi-card{background:var(--card);padding:15px;border-radius:15px;border-left:5px solid var(--gold);box-shadow:0 4px 15px rgba(0,0,0,0.05)}
.kpi-label{font-size:9px;color:#64748B;text-transform:uppercase;font-weight:700;margin-bottom:5px;display:block}
.kpi-val{font-size:18px;font-weight:800}
.glass-card{background:var(--card);border-radius:15px;padding:15px;margin-bottom:20px;box-shadow:0 4px 15px rgba(0,0,0,0.05)}
table{width:100%;border-collapse:collapse;font-size:10px}
th{text-align:left;padding:8px;background:#F8FAFC;color:#64748B}
td{padding:10px;border-bottom:1px solid #F1F5F9}
</style>
</head>
<body>

<header class="hdr">
  <div style="display:flex;align-items:center;gap:8px">
    <div style="background:#fff;color:var(--navy);padding:4px 8px;border-radius:5px;font-weight:900">CHYC</div>
    <div style="line-height:1.1">
        <div style="font-weight:800;font-size:12px">CONSULTING</div>
        <div style="font-size:8px;opacity:0.8">MEAL Intelligence</div>
    </div>
  </div>
  <div class="btn-group">
    <button class="action-btn btn-sync" id="syncBtn" onclick="fetchData()">🔄 MAJ</button>
    <button class="action-btn btn-pdf" onclick="exportToPDF()">📄 PDF</button>
    <a href="https://ee.kobotoolbox.org/x/JA6jKzhp" target="_blank" class="action-btn btn-kobo">➕ SAISIE</a>
  </div>
</header>

<div class="filter-section">
  <select id="fProj" onchange="render()">
    <option value="ALL">📂 TOUS LES PROJETS</option>
    <option value="P001">P001 - Marchands Tabliers</option>
    <option value="P002">P002 - Formation Numérique</option>
    <option value="P003">P003 - Microfinance</option>
    <option value="P004">P004 - Santé</option>
    <option value="P005">P005 - Agropastoral</option>
  </select>
  <select id="fSect" onchange="render()">
    <option value="ALL">🎯 TOUS LES SECTEURS</option>
    <option value="sante">Santé</option>
    <option value="agriculture">Agriculture</option>
    <option value="microfinance">Microfinance</option>
    <option value="education">Éducation</option>
    <option value="wash">WASH</option>
    <option value="protection">Protection</option>
  </select>
</div>

<div class="main" id="reportContent">
  <div class="kpi-grid">
    <div class="kpi-card"><span class="kpi-label">Bénéficiaires</span><span class="kpi-val" id="vTotal">0</span></div>
    <div class="kpi-card" style="border-left-color:var(--ok)"><span class="kpi-label">Kits Livrés</span><span class="kpi-val" id="vKits">0</span></div>
    <div class="kpi-card" style="border-left-color:#DB2777"><span class="kpi-label">% Femmes</span><span class="kpi-val" id="vFemmes">0%</span></div>
    <div class="kpi-card" style="border-left-color:#4F46E5"><span class="kpi-label">Budget XOF</span><span class="kpi-val" id="vBudget">0</span></div>
  </div>

  <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap:15px;">
    <div class="glass-card">
        <div style="font-size:12px;font-weight:700;margin-bottom:10px">📊 IMPACT PAR SECTEUR</div>
        <div style="height:220px"><canvas id="sectorChart"></canvas></div>
    </div>
    <div class="glass-card">
        <div style="font-size:12px;font-weight:700;margin-bottom:10px">📋 DERNIÈRES MISSIONS</div>
        <div style="overflow-x:auto">
          <table>
            <thead><tr><th>Date</th><th>Agent / Localité</th><th>Impact</th></tr></thead>
            <tbody id="tblBody"></tbody>
          </table>
        </div>
    </div>
  </div>
</div>

<script>
const ASSET_ID = 'aL4EkYb8XAiZW5oTHBbCFK'; 
const TOKEN = '421c81d9ac9d00f49953d2e903d8080ab9b274bd'; 

let rawData = [];
let myChart = null;

async function fetchData() {
    const btn = document.getElementById('syncBtn');
    btn.innerHTML = '⏳...';
    const targetUrl = `https://kf.kobotoolbox.org/api/v2/assets/${ASSET_ID}/data.json`;
    
    try {
        const response = await fetch(targetUrl, {
            method: 'GET',
            headers: { 'Authorization': `Token ${TOKEN}` }
        });
        if (!response.ok) throw new Error('API Error');
        const content = await response.json();
        if (content.results) {
            rawData = content.results;
            btn.innerHTML = '✅ ' + rawData.length;
            render();
        }
    } catch (e) { 
        btn.innerHTML = '❌ Erreur'; 
    }
}

function render() {
    const pF = document.getElementById('fProj').value;
    const sF = document.getElementById('fSect').value;
    
    const filtered = rawData.filter(r => {
        const matchP = (pF === 'ALL' || (r.code_projet || '').includes(pF));
        const matchS = (sF === 'ALL' || (r.secteur_projet || '').includes(sF));
        return matchP && matchS;
    });

    let bT=0, bF=0, k=0, b=0;
    const tbody = document.getElementById('tblBody');
    tbody.innerHTML = '';

    filtered.forEach((r, idx) => {
        // Lecture précise des colonnes de votre XLSForm
        const h = parseInt(r.nb_beneficiaires_h) || 0;
        const f = parseInt(r.nb_beneficiaires_f) || 0;
        const kits = parseInt(r.nb_kits_distribues) || 0;
        const depense = parseFloat(r.montant_depense) || 0;

        bT += (h + f); 
        bF += f;
        k += kits;
        b += depense;

        if(idx < 6) {
            tbody.innerHTML += `
                <tr>
                    <td>${(r.date_mission || '').split('T')[0]}</td>
                    <td><b>${r.nom_agent || 'N/A'}</b><br>${r.zone_intervention || 'N/A'}</td>
                    <td>${h + f} Pers.</td>
                </tr>`;
        }
    });

    document.getElementById('vTotal').textContent = bT.toLocaleString();
    document.getElementById('vKits').textContent = k.toLocaleString();
    document.getElementById('vBudget').textContent = b.toLocaleString() + ' F';
    document.getElementById('vFemmes').textContent = bT > 0 ? Math.round((bF/bT)*100)+'%' : '0%';
    
    updateChart(filtered);
}

function updateChart(data) {
    const ctx = document.getElementById('sectorChart').getContext('2d');
    const s = {}; 
    data.forEach(r => { 
        const v = r.secteur_projet || 'Autre'; 
        s[v] = (s[v] || 0) + 1; 
    });
    if (myChart) myChart.destroy();
    myChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: Object.keys(s),
            datasets: [{ data: Object.values(s), backgroundColor: ['#0F1B42', '#B8972A', '#10B981', '#4F46E5', '#DB2777'] }]
        },
        options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } } }
    });
}

function exportToPDF() {
    const element = document.getElementById('reportContent');
    const opt = { margin: 10, filename: 'CHYC_MEAL_Rapport.pdf', html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4' } };
    html2pdf().set(opt).from(element).save();
}

window.onload = fetchData;
</script>
</body>
</html>
