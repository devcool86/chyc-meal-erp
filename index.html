<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
    <title>CHYC-MEAL v9.0 | Dashboard Live</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0F1B42; --gold: #B8972A; --bg: #F4F7FE; --ok: #10B981; --err: #EF4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--navy); }

        /* HEADER */
        header { background: var(--navy); color: #fff; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,.3); }
        .logo-box { background: var(--gold); color: var(--navy); padding: 5px 10px; border-radius: 6px; font-weight: 800; font-size: .85rem; }
        #sync-status { font-size: .7rem; cursor: pointer; padding: 6px 14px; border-radius: 20px; background: #64748B; color: white; font-weight: 700; border: none; transition: .2s; }
        .status-ok  { background: var(--ok)  !important; }
        .status-err { background: var(--err) !important; }

        /* FILTER BAR */
        .filter-bar { background: #1A2A5E; padding: 10px 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        select { background: #243470; color: white; border: 1px solid var(--gold); padding: 10px 8px; border-radius: 8px; font-size: .75rem; width: 100%; font-family: 'Sora', sans-serif; cursor: pointer; }

        /* SECTOR BANNER */
        .sect-banner { display: none; padding: 10px 14px; font-size: .75rem; font-weight: 700; color: #fff; align-items: center; gap: 8px; }

        /* CONTAINER */
        .container { padding: 14px; max-width: 900px; margin: 0 auto; }

        /* ACTION BUTTONS */
        .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        .btn { padding: 12px; border-radius: 10px; border: none; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 6px; font-size: .75rem; text-decoration: none; cursor: pointer; font-family: 'Sora', sans-serif; }
        .btn-pdf  { background: #334155; color: white; }
        .btn-kobo { background: var(--gold); color: var(--navy); }
        .btn:active { transform: scale(.97); }

        /* KPI GRID */
        .kpi-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 16px; }
        .kpi-card { background: #fff; padding: 16px; border-radius: 14px; border-bottom: 4px solid #E2E8F0; transition: .2s; }
        .kpi-card.active-kpi { border-bottom-color: var(--gold); box-shadow: 0 4px 16px rgba(184,151,42,.2); }
        .kpi-val { display: block; font-size: 1.4rem; font-weight: 800; line-height: 1.1; margin-bottom: 3px; }
        .kpi-lbl { font-size: .6rem; color: #64748B; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }

        /* SECTOR INDICATORS PANEL */
        .sect-panel { background: #fff; border-radius: 14px; padding: 14px; margin-bottom: 14px; border-left: 4px solid var(--gold); display: none; }
        .sect-panel h3 { font-size: .8rem; font-weight: 800; color: var(--navy); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
        .sect-indicators { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; }
        .s-ind { background: #F4F7FE; border-radius: 10px; padding: 12px 10px; text-align: center; }
        .s-ind .s-val { font-size: 1.1rem; font-weight: 800; color: var(--navy); }
        .s-ind .s-lbl { font-size: .6rem; color: #64748B; margin-top: 3px; text-transform: uppercase; letter-spacing: .4px; }

        /* CHART */
        .card { background: #fff; border-radius: 14px; padding: 14px; margin-bottom: 14px; }
        .card-title { font-size: .75rem; font-weight: 700; color: var(--navy); margin-bottom: 10px; }

        /* TABLE */
        .table-card { background: #fff; border-radius: 14px; overflow: hidden; margin-bottom: 14px; }
        table { width: 100%; border-collapse: collapse; font-size: .72rem; }
        th { background: var(--navy); color: #fff; padding: 10px 10px; text-align: left; font-size: .65rem; text-transform: uppercase; letter-spacing: .5px; }
        td { padding: 10px; border-bottom: 1px solid #F1F5F9; color: var(--navy); }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #F8FAFF; }
        .badge { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: .6rem; font-weight: 700; background: #EEF2FA; color: var(--navy); }
        .badge-ok { background: #D1FAE5; color: #065F46; }
        .badge-warn { background: #FEF3C7; color: #92400E; }

        /* EMPTY STATE */
        .empty { text-align: center; padding: 30px; color: #94A3B8; }
        .empty-icon { font-size: 2rem; margin-bottom: 8px; }

        @media print { .action-row, #sync-status, .filter-bar { display: none; } }
    </style>
</head>
<body>

<header>
    <div style="display:flex;align-items:center;gap:10px">
        <div class="logo-box">CHYC</div>
        <div style="font-weight:800;font-size:.85rem">MEAL v9.0</div>
    </div>
    <button id="sync-status" onclick="fetchData()">🔄 ACTUALISER</button>
</header>

<!-- FILTRES -->
<div class="filter-bar">
    <select id="f-proj" onchange="render()">
        <option value="ALL">🏢 PROJETS (TOUS)</option>
    </select>
    <select id="f-sect" onchange="render()">
        <option value="ALL">📂 SECTEURS (TOUS)</option>
        <option value="sante">🏥 Santé</option>
        <option value="agriculture">🌾 Agriculture</option>
        <option value="microfinance">💰 Microfinance / AGR</option>
        <option value="education">📚 Éducation / Formation</option>
        <option value="wash">🚰 Eau & Assainissement</option>
        <option value="protection">🛡️ Protection & Genre</option>
        <option value="logistique">📦 Logistique / Distribution</option>
    </select>
</div>

<!-- SECT BANNER -->
<div class="sect-banner" id="sect-banner"></div>

<div class="container" id="report-area">

    <!-- ACTIONS -->
    <div class="action-row">
        <a href="https://ee.kobotoolbox.org/x/aTta3p1L" target="_blank" class="btn btn-kobo">➕ COLLECTE KOBO</a>
        <button onclick="exportPDF()" class="btn btn-pdf">📄 RAPPORT PDF</button>
    </div>

    <!-- KPI GLOBAUX -->
    <div class="kpi-grid">
        <div class="kpi-card" id="kpi-ben">
            <span class="kpi-val" id="v-ben">0</span>
            <span class="kpi-lbl">👥 Bénéficiaires</span>
        </div>
        <div class="kpi-card" id="kpi-gen">
            <span class="kpi-val" id="v-gen" style="color:#DB2777">0%</span>
            <span class="kpi-lbl">♀ Femmes</span>
        </div>
        <div class="kpi-card" id="kpi-cash">
            <span class="kpi-val" id="v-cash" style="color:#059669">0 F</span>
            <span class="kpi-lbl">💵 Dépenses (FCFA)</span>
        </div>
        <div class="kpi-card" id="kpi-act">
            <span class="kpi-val" id="v-act">0</span>
            <span class="kpi-lbl">📋 Missions</span>
        </div>
    </div>

    <!-- PANNEAU INDICATEURS SECTORIELS -->
    <div class="sect-panel" id="sect-panel">
        <h3 id="sect-panel-title">🎯 Indicateurs sectoriels</h3>
        <div class="sect-indicators" id="sect-indicators"></div>
    </div>

    <!-- GRAPHIQUE -->
    <div class="card">
        <div class="card-title" id="chart-title">📊 Répartition des missions</div>
        <div style="height:180px"><canvas id="myChart"></canvas></div>
    </div>

    <!-- TABLEAU -->
    <div class="table-card">
        <table>
            <thead>
                <tr id="table-head">
                    <th>Date · Agent</th>
                    <th>Zone · Secteur</th>
                    <th>Bénéf.</th>
                    <th>Dépense</th>
                </tr>
            </thead>
            <tbody id="v-table"></tbody>
        </table>
    </div>

</div>

<script>
const ASSET_ID = 'anJWsYbZiGvWEz3ZjmwcqY';
let rawData = [];
let chart = null;

// ── SECTEUR CONFIG ──
const SECT_CONFIG = {
    sante: {
        label: '🏥 Santé',
        color: '#6E8CB5',
        bgColor: '#EEF4FF',
        indicators: [
            { key: 'nb_consultations',     label: 'Consultations' },
            { key: 'nb_enfants_vaccines',  label: 'Enfants vaccinés' },
            { key: 'nb_femmes_CPN',        label: 'Femmes CPN' },
            { key: 'nb_accouchements',     label: 'Accouchements assistés' },
            { key: 'nb_cas_malnutrition',  label: 'Cas malnutrition' },
            { key: 'taux_guerison',        label: 'Taux guérison (%)', avg: true },
        ]
    },
    agriculture: {
        label: '🌾 Agriculture',
        color: '#4CAF8A',
        bgColor: '#EDFAF4',
        indicators: [
            { key: 'nb_agriculteurs_touches', label: 'Agriculteurs touchés' },
            { key: 'superficie_ha',           label: 'Superficie (ha)', dec: true },
            { key: 'production_totale_kg',    label: 'Production (kg)', dec: true },
            { key: 'nb_intrants_distribues',  label: 'Intrants distribués' },
        ]
    },
    microfinance: {
        label: '💰 Microfinance',
        color: '#B8972A',
        bgColor: '#FEF7E8',
        indicators: [
            { key: 'nb_beneficiaires_credit', label: 'Bénéf. crédit' },
            { key: 'montant_credit_octroye',  label: 'Crédit octroyé (FCFA)', dec: true },
            { key: 'taux_remboursement',      label: 'Taux remboursement (%)', avg: true },
            { key: 'montant_epargne_collecte',label: 'Épargne collectée (FCFA)', dec: true },
            { key: 'nb_groupes_solidarite',   label: 'Groupes solidarité' },
            { key: 'nb_AGR_soutenues',        label: 'AGR soutenues' },
        ]
    },
    education: {
        label: '📚 Éducation',
        color: '#1A2A5E',
        bgColor: '#EEF2FA',
        indicators: [
            { key: 'nb_apprenants_h',    label: 'Apprenants H' },
            { key: 'nb_apprenants_f',    label: 'Apprenants F' },
            { key: 'nb_heures_formation',label: 'Heures formation' },
            { key: 'taux_presence',      label: 'Taux présence (%)', avg: true },
            { key: 'taux_reussite',      label: 'Taux réussite (%)', avg: true },
        ]
    },
    wash: {
        label: '🚰 WASH',
        color: '#29B6D8',
        bgColor: '#EBF9FD',
        indicators: [
            { key: 'nb_menages_acces_eau',    label: 'Ménages eau potable' },
            { key: 'nb_latrines_construites', label: 'Latrines construites' },
            { key: 'nb_points_eau',           label: 'Points d\'eau' },
            { key: 'nb_sensibilises_hygiene', label: 'Sensibilisés hygiène' },
        ]
    },
    protection: {
        label: '🛡️ Protection',
        color: '#E26B60',
        bgColor: '#FFF0EF',
        indicators: [
            { key: 'nb_cas_VBG_documentes', label: 'Cas VBG documentés' },
            { key: 'nb_cas_references',     label: 'Cas référés' },
            { key: 'nb_enfants_proteges',   label: 'Enfants protégés' },
        ]
    },
    logistique: {
        label: '📦 Logistique',
        color: '#9B59B6',
        bgColor: '#F5EFFE',
        indicators: [
            { key: 'nb_kits_distribues', label: 'Kits distribués' },
            { key: 'stock_initial',      label: 'Stock initial', dec: true },
            { key: 'stock_final',        label: 'Stock final', dec: true },
            { key: 'consommation',       label: 'Consommation', dec: true },
        ]
    }
};

// ── FETCH ──
async function fetchData() {
    const st = document.getElementById('sync-status');
    st.innerText = '⌛ SYNC...';
    st.className = '';
    const url = `https://kf.kobotoolbox.org/api/v2/assets/${ASSET_ID}/data.json`;
    try {
        const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}&t=${Date.now()}`);
        const d = await r.json();
        const content = JSON.parse(d.contents);
        if (content.results) {
            rawData = content.results;
            st.innerText = `✅ ${rawData.length} soumissions`;
            st.className = 'status-ok';
            initProjectFilter();
            render();
        } else throw new Error('No results');
    } catch (e) {
        st.innerText = '❌ ERREUR';
        st.className = 'status-err';
        console.error(e);
    }
}

// ── INIT PROJECT FILTER ──
function initProjectFilter() {
    const pS = document.getElementById('f-proj');
    const projs = [...new Set(rawData.map(r => r.code_projet))].filter(Boolean).sort();
    pS.innerHTML = '<option value="ALL">🏢 PROJETS (TOUS)</option>';
    const labels = {P001:'Marchands Tabliers',P002:'Formation Numérique',P003:'Microfinance Saint-Louis',P004:'Santé Communautaire',P005:'Agropastoral Vallée'};
    projs.forEach(p => {
        const lbl = labels[p] || p;
        pS.innerHTML += `<option value="${p}">${p} — ${lbl}</option>`;
    });
}

// ── RENDER ──
function render() {
    const pF = document.getElementById('f-proj').value;
    const sF = document.getElementById('f-sect').value.toLowerCase().trim();

    // Filter data
    const data = rawData.filter(r => {
        const valP = (r.code_projet || '').toString();
        const valS = (r.secteur_projet || '').toString().toLowerCase().trim();
        return (pF === 'ALL' || valP === pF) && (sF === 'all' || valS === sF);
    });

    // ── GLOBAL KPIs ──
    let benH = 0, benF = 0, cash = 0;
    data.forEach(r => {
        benH += parseInt(r.nb_beneficiaires_h || 0);
        benF += parseInt(r.nb_beneficiaires_f || 0);
        cash += parseFloat(r.montant_depense || 0);
    });
    const ben = benH + benF;

    document.getElementById('v-ben').innerText  = ben.toLocaleString('fr-FR');
    document.getElementById('v-gen').innerText  = ben > 0 ? Math.round((benF/ben)*100)+'%' : '0%';
    document.getElementById('v-cash').innerText = Math.round(cash).toLocaleString('fr-FR') + ' F';
    document.getElementById('v-act').innerText  = data.length;

    // ── SECTOR BANNER & PANEL ──
    const banner = document.getElementById('sect-banner');
    const panel  = document.getElementById('sect-panel');
    const cfg    = SECT_CONFIG[sF];

    if (sF !== 'all' && cfg) {
        // Show banner
        banner.style.display    = 'flex';
        banner.style.background = cfg.color;
        banner.innerHTML = `<span style="font-size:1.1rem">${cfg.label.split(' ')[0]}</span> Filtre actif : <strong>${cfg.label}</strong> — ${data.length} mission(s)`;

        // Show sector panel
        panel.style.display     = 'block';
        panel.style.borderColor = cfg.color;
        document.getElementById('sect-panel-title').innerHTML = `${cfg.label.split(' ')[0]} Indicateurs — ${cfg.label}`;
        document.getElementById('sect-panel-title').style.color = cfg.color;

        // Compute sector-specific indicators
        const inds = cfg.indicators;
        const html = inds.map(ind => {
            let val;
            if (ind.avg) {
                const vals = data.map(r => parseFloat(r[ind.key]||0)).filter(v=>v>0);
                val = vals.length > 0 ? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : '—';
            } else if (ind.dec) {
                val = data.reduce((a,r) => a + parseFloat(r[ind.key]||0), 0);
                val = val > 0 ? val.toLocaleString('fr-FR') : '0';
            } else {
                val = data.reduce((a,r) => a + parseInt(r[ind.key]||0), 0);
                val = val.toLocaleString('fr-FR');
            }
            return `<div class="s-ind" style="background:${cfg.bgColor}">
                <div class="s-val" style="color:${cfg.color}">${val}</div>
                <div class="s-lbl">${ind.label}</div>
            </div>`;
        }).join('');
        document.getElementById('sect-indicators').innerHTML = html;

        // Highlight KPI cards
        document.querySelectorAll('.kpi-card').forEach(c => c.classList.remove('active-kpi'));
        document.getElementById('kpi-ben').classList.add('active-kpi');
        document.getElementById('kpi-act').classList.add('active-kpi');

    } else {
        banner.style.display = 'none';
        panel.style.display  = 'none';
        document.querySelectorAll('.kpi-card').forEach(c => c.classList.remove('active-kpi'));
    }

    // ── CHART ──
    let graphData = {};
    if (sF === 'all') {
        // All sectors: show distribution by sector
        data.forEach(r => {
            const s = (r.secteur_projet || 'Autre');
            const lbl = SECT_CONFIG[s] ? SECT_CONFIG[s].label : s.toUpperCase();
            graphData[lbl] = (graphData[lbl] || 0) + 1;
        });
        document.getElementById('chart-title').innerText = '📊 Répartition des missions par secteur';
    } else if (cfg) {
        // Single sector: show by zone or by activity type
        data.forEach(r => {
            const zone = r.zone_intervention || r.type_activite || 'Autre';
            graphData[zone] = (graphData[zone] || 0) + 1;
        });
        document.getElementById('chart-title').innerText = `📊 ${cfg.label} — Missions par zone`;
    }

    const colors = ['#0F1B42','#B8972A','#6E8CB5','#10B981','#29B6D8','#E26B60','#9B59B6','#4CAF8A'];
    if (chart) chart.destroy();
    if (Object.keys(graphData).length > 0) {
        chart = new Chart(document.getElementById('myChart'), {
            type: sF === 'all' ? 'doughnut' : 'bar',
            data: {
                labels: Object.keys(graphData),
                datasets: [{
                    data: Object.values(graphData),
                    backgroundColor: colors,
                    borderRadius: sF !== 'all' ? 6 : 0,
                    borderSkipped: false,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { position: sF === 'all' ? 'right' : 'none', labels: { font: { size: 10 } } } },
                scales: sF !== 'all' ? { y: { beginAtZero: true, grid: { color: '#F1F5F9' } }, x: { grid: { display: false } } } : {}
            }
        });
    }

    // ── TABLE ──
    renderTable(data, sF, cfg);
}

// ── TABLE ──
function renderTable(data, sF, cfg) {
    const tbody = document.getElementById('v-table');
    const thead = document.getElementById('table-head');

    if (!data.length) {
        tbody.innerHTML = `<tr><td colspan="4"><div class="empty"><div class="empty-icon">📭</div>Aucune mission pour ce filtre</div></td></tr>`;
        return;
    }

    // Dynamic columns based on sector
    if (sF !== 'all' && cfg) {
        const extraKey  = cfg.indicators[0]?.key || '';
        const extraLbl  = cfg.indicators[0]?.label || 'Indicateur';
        thead.innerHTML = `<th>Date · Agent</th><th>Zone</th><th>${extraLbl}</th><th>Dépense</th>`;
        tbody.innerHTML = data.slice(0, 15).map(r => {
            const date = r._submission_time ? new Date(r._submission_time).toLocaleDateString('fr-FR', {day:'2-digit',month:'2-digit'}) : '—';
            const extraVal = parseFloat(r[extraKey] || 0).toLocaleString('fr-FR');
            const dep = parseFloat(r.montant_depense || 0);
            const valid = r.signature_agent ? '<span class="badge badge-ok">✓</span>' : '<span class="badge badge-warn">⏳</span>';
            return `<tr>
                <td><strong>${date}</strong><br><span style="color:#64748B;font-size:.65rem">${r.nom_agent||'—'}</span></td>
                <td>${r.zone_intervention||'—'}</td>
                <td><strong>${extraVal}</strong></td>
                <td>${dep > 0 ? dep.toLocaleString('fr-FR')+' F' : '—'} ${valid}</td>
            </tr>`;
        }).join('');
