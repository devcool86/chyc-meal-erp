<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
    <title>CHYC-MEAL v9.5 | Live</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0F1B42; --gold: #B8972A; --bg: #F4F7FE; --ok: #10B981; --err: #EF4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--navy); }
        header { background: var(--navy); color: #fff; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo-box { background: var(--gold); color: var(--navy); padding: 5px 10px; border-radius: 6px; font-weight: 800; font-size: .85rem; }
        #sync-status { font-size: .7rem; padding: 6px 14px; border-radius: 20px; background: #64748B; color: white; font-weight: 700; border: none; }
        .status-ok { background: var(--ok) !important; }
        .filter-bar { background: #1A2A5E; padding: 10px 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        select { background: #243470; color: white; border: 1px solid var(--gold); padding: 10px; border-radius: 8px; font-size: .75rem; width: 100%; }
        .container { padding: 14px; max-width: 900px; margin: 0 auto; }
        .kpi-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 16px; }
        .kpi-card { background: #fff; padding: 16px; border-radius: 14px; border-bottom: 4px solid #E2E8F0; }
        .kpi-val { display: block; font-size: 1.4rem; font-weight: 800; line-height: 1.1; }
        .kpi-lbl { font-size: .6rem; color: #64748B; font-weight: 600; text-transform: uppercase; margin-top: 4px; }
        .card { background: #fff; border-radius: 14px; padding: 14px; margin-bottom: 14px; }
        .table-card { max-height: 400px; overflow-y: auto; background: #fff; border-radius: 14px; }
        table { width: 100%; border-collapse: collapse; font-size: .72rem; }
        td { padding: 12px 10px; border-bottom: 1px solid #F1F5F9; }
        .btn-kobo { background: var(--gold); color: var(--navy); padding: 12px; border-radius: 10px; text-decoration: none; display: block; text-align: center; font-weight: 800; margin-bottom: 15px; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <div style="display:flex;align-items:center;gap:10px">
        <div class="logo-box">CHYC</div>
        <div style="font-weight:800;font-size:.85rem">MEAL v9.5</div>
    </div>
    <button id="sync-status" onclick="fetchData()">🔄 ACTUALISER</button>
</header>

<div class="filter-bar">
    <select id="f-proj" onchange="render()"><option value="ALL">🏢 PROJETS (TOUS)</option></select>
    <select id="f-sect" onchange="render()">
        <option value="ALL">📂 SECTEURS (TOUS)</option>
        <option value="sante">🏥 Santé</option>
        <option value="agriculture">🌾 Agriculture</option>
        <option value="microfinance">💰 Microfinance</option>
        <option value="education">📚 Éducation</option>
        <option value="wash">🚰 WASH</option>
        <option value="protection">🛡️ Protection</option>
    </select>
</div>

<div class="container" id="report-area">
    <a href="https://ee.kobotoolbox.org/x/JA6jKzhp" target="_blank" class="btn-kobo">➕ NOUVELLE SAISIE TERRAIN</a>

    <div class="kpi-grid">
        <div class="kpi-card"><span class="kpi-val" id="v-ben">0</span><span class="kpi-lbl">BÉNÉFICIAIRES</span></div>
        <div class="kpi-card"><span class="kpi-val" id="v-gen" style="color:#DB2777">0%</span><span class="kpi-lbl">♀ FEMMES</span></div>
        <div class="kpi-card"><span class="kpi-val" id="v-cash" style="color:#059669">0 F</span><span class="kpi-lbl">DÉPENSES</span></div>
        <div class="kpi-card"><span class="kpi-val" id="v-act">0</span><span class="kpi-lbl">MISSIONS</span></div>
    </div>

    <div class="card">
        <div style="height:180px"><canvas id="myChart"></canvas></div>
    </div>

    <div class="table-card">
        <table><tbody id="v-table"></tbody></table>
    </div>
</div>

<script>
const ASSET_ID = 'aL4EkYb8XAiZW5oTHBbCFK'; 
let rawData = [];
let chart = null;

async function fetchData() {
    const st = document.getElementById('sync-status');
    st.innerText = '⌛ SYNC...';
    try {
        const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://kf.kobotoolbox.org/api/v2/assets/'+ASSET_ID+'/data.json')}&t=${Date.now()}`);
        const d = await r.json();
        const content = JSON.parse(d.contents);
        if (content.results) {
            rawData = content.results;
            st.innerText = `✅ ${rawData.length} ENTRÉES`;
            st.className = 'status-ok';
            initProjectFilter();
            render();
        }
    } catch (e) { st.innerText = '❌ ERREUR'; }
}

function initProjectFilter() {
    const pS = document.getElementById('f-proj');
    const projs = [...new Set(rawData.map(r => r.code_projet))].filter(Boolean).sort();
    pS.innerHTML = '<option value="ALL">🏢 PROJETS (TOUS)</option>';
    projs.forEach(p => pS.innerHTML += `<option value="${p}">${p.toUpperCase()}</option>`);
}

function render() {
    const pF = document.getElementById('f-proj').value;
    const sF = document.getElementById('f-sect').value.toLowerCase();
    
    const data = rawData.filter(r => {
        const pMatch = pF === 'ALL' || (r.code_projet === pF);
        const sMatch = sF === 'all' || (r.secteur_projet||'').toLowerCase().includes(sF);
        return pMatch && sMatch;
    });

    let ben = 0, f = 0, cash = 0, graphData = {};
    const tb = document.getElementById('v-table');
    tb.innerHTML = '';

    data.forEach(r => {
        // CORRECTION : Lecture des données dans le groupe grp_impact
        const vH = parseInt(r['grp_impact/nb_beneficiaires_h'] || r.nb_beneficiaires_h || 0);
        const vF = parseInt(r['grp_impact/nb_beneficiaires_f'] || r.nb_beneficiaires_f || 0);
        const vM = parseFloat(r['grp_impact/montant_depense'] || r.montant_depense || 0);
        
        ben += (vH + vF); f += vF; cash += vM;
        let s = (r.secteur_projet || 'AUTRE').toUpperCase();
        graphData[s] = (graphData[s] || 0) + 1;
        
        tb.innerHTML += `<tr>
            <td>${new Date(r._submission_time).toLocaleDateString()}<br><small>${r.nom_agent || 'Agent'}</small></td>
            <td><b>${s}</b><br>${r.zone_intervention || ''}</td>
            <td style="text-align:right"><b>${(vH+vF)}</b><br>${vM.toLocaleString()} F</td>
        </tr>`;
    });

    document.getElementById('v-ben').innerText = ben.toLocaleString();
    document.getElementById('v-gen').innerText = ben > 0 ? Math.round((f/ben)*100)+'%' : '0%';
    document.getElementById('v-cash').innerText = Math.round(cash).toLocaleString() + ' F';
    document.getElementById('v-act').innerText = data.length;

    if (chart) chart.destroy();
    chart = new Chart(document.getElementById('myChart'), {
        type: 'doughnut',
        data: { labels: Object.keys(graphData), datasets: [{ data: Object.values(graphData), backgroundColor: ['#0F1B42','#B8972A','#6E8CB5','#10B981','#E26B60'] }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
    });
}

window.onload = fetchData;
</script>
</body>
</html>
