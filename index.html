<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>CHYC-MEAL ERP v4.9</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #1A2A5E; --gold: #B8972A; --bg: #EEF2FA; --card: #fff; --r: 14px; }
        body { margin: 0; font-family: 'Sora', sans-serif; background: var(--bg); color: var(--navy); }
        header { background: #0F1B42; color: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        #sync-status { font-size: 0.65rem; font-weight: 800; border-radius: 20px; padding: 5px 12px; background: rgba(255,255,255,0.1); text-transform: uppercase; }
        .nav-tabs { display: flex; background: var(--navy); padding: 5px; position: sticky; top: 60px; z-index: 90; }
        .tab { flex: 1; text-align: center; padding: 12px; color: #A8C0D8; font-size: 0.75rem; font-weight: 600; cursor: pointer; }
        .tab.active { background: #243470; color: #fff; box-shadow: inset 0 0 0 1px var(--gold); border-radius: 8px; }
        .container { padding: 20px; max-width: 1000px; margin: 0 auto; }
        .kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .kpi-card { background: var(--card); padding: 18px; border-radius: var(--r); border-left: 4px solid var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .kpi-val { display: block; font-size: 1.2rem; font-weight: 800; }
        .card { background: var(--card); border-radius: var(--r); padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn { background: var(--navy); color: #fff; padding: 14px; border-radius: 12px; font-weight: 700; border: none; cursor: pointer; width: 100%; display: flex; justify-content: center; text-decoration: none; align-items: center; gap: 8px; }
        .section { display: none; }
        .section.active { display: block; }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        td { padding: 10px 0; border-bottom: 1px solid #F8FAFC; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:10px;">
        <div style="background:var(--gold); color:#0F1B42; padding:8px; border-radius:8px; font-weight:800;">CH</div>
        <div style="font-weight:800; font-size:0.9rem;">CHYC-MEAL</div>
    </div>
    <div id="sync-status">Tentative...</div>
</header>

<div class="nav-tabs">
    <div class="tab active" onclick="switchTab('dash', this)">DASHBOARD</div>
    <div class="tab" onclick="switchTab('data', this)">HISTORIQUE</div>
    <div class="tab" onclick="switchTab('form', this)">COLLECTE</div>
</div>

<div class="container">
    <div id="dash" class="section active">
        <button onclick="genererPDF()" class="btn" style="background:#334155; font-size:0.75rem; margin-bottom:15px;">📄 GÉNÉRER RAPPORT PDF</button>
        <div class="kpi-grid">
            <div class="kpi-card"><span class="kpi-val" id="kpi-ben">0</span><span style="font-size:0.6rem; color:#6E8CB5;">Bénéficiaires</span></div>
            <div class="kpi-card"><span class="kpi-val" id="kpi-genre">0%</span><span style="font-size:0.6rem; color:#6E8CB5;">Ratio Femmes</span></div>
            <div class="kpi-card"><span class="kpi-val" id="kpi-budget">0 F</span><span style="font-size:0.6rem; color:#6E8CB5;">Budget Engagé</span></div>
            <div class="kpi-card"><span class="kpi-val" id="kpi-form">0</span><span style="font-size:0.6rem; color:#6E8CB5;">Activités</span></div>
        </div>
        <div class="card">
            <h2 style="font-size:0.8rem; margin:0 0 15px 0;">Secteurs d'Intervention</h2>
            <div style="height:250px;"><canvas id="pieChart"></canvas></div>
        </div>
    </div>

    <div id="data" class="section">
        <div class="card">
            <h2>Données Terrain</h2>
            <table><tbody id="table-body"></tbody></table>
        </div>
    </div>

    <div id="form" class="section" style="text-align:center;">
        <div class="card">
            <div style="font-size:3rem;">📡</div>
            <h2>Accès Kobo</h2>
            <a href="https://ee.kobotoolbox.org/x/JA6jKzhp" target="_blank" class="btn" style="background:var(--gold); color:#000;">NOUVEAU RAPPORT</a>
        </div>
    </div>
</div>

<script>
    const TOKEN = '421c81d9ac9d00f49953d2e903d8080ab9b274bd';
    
    // On définit les IDs possibles (Kobo change parfois l'ID entre l'URL et l'API)
    const IDS_A_TESTER = ['aL4EkYb8XAiZW5oTHBbCFK', 'AnJWsYbZiGvWEz3ZjmwcqY']; 
    
    async function syncSaaS() {
        const status = document.getElementById('sync-status');
        
        for (let id of IDS_A_TESTER) {
            status.innerText = `Test ID: ${id.substring(0,5)}...`;
            const koboUrl = `https://kf.kobotoolbox.org/api/v2/assets/${id}/data.json`;
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(koboUrl)}`;

            try {
                const response = await fetch(proxyUrl);
                const json = await response.json();
                const data = JSON.parse(json.contents);
                
                if(data && data.results) {
                    processData(data.results);
                    status.innerText = '✅ CONNECTÉ';
                    status.style.color = '#4ade80';
                    return; // Succès, on arrête de chercher
                }
            } catch (e) {
                console.log(`Échec avec ID ${id}`);
            }
        }
        status.innerText = '⚠️ ERREUR CONFIG';
        status.style.color = '#f87171';
    }

    function processData(results) {
        let ben = 0, femmes = 0, cash = 0, secteurs = {};
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';

        results.forEach((r, i) => {
            const h = parseInt(r.nb_beneficiaires_h || r.nb_apprenants_h || 0);
            const f = parseInt(r.nb_beneficiaires_f || r.nb_apprenants_f || 0);
            ben += (h + f);
            femmes += f;
            cash += parseInt(r.montant_depense || 0);
            let s = (r.secteur_projet || 'Autre').toUpperCase();
            secteurs[s] = (secteurs[s] || 0) + 1;

            if(i < 10) {
                tbody.innerHTML += `<tr><td>${new Date(r._submission_time).toLocaleDateString()}</td><td><b>${r.zone_intervention || '-'}</b></td><td style="text-align:right; color:var(--gold)">${s}</td></tr>`;
            }
        });

        document.getElementById('kpi-ben').innerText = ben.toLocaleString();
        document.getElementById('kpi-budget').innerText = cash.toLocaleString() + ' F';
        document.getElementById('kpi-form').innerText = results.length;
        document.getElementById('kpi-genre').innerText = ben > 0 ? Math.round((femmes/ben)*100)+'%' : '0%';
        renderPie(secteurs);
    }

    function renderPie(secteurs) {
        const ctx = document.getElementById('pieChart').getContext('2d');
        if(window.myChart) window.myChart.destroy();
        window.myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: Object.keys(secteurs),
                datasets: [{ data: Object.values(secteurs), backgroundColor: ['#1A2A5E','#B8972A','#6E8CB5','#A8C0D8','#E8F5EE'] }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    async function genererPDF() {
        const element = document.getElementById('dash');
        const opt = { margin: 10, filename: 'Rapport_CHYC.pdf', html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4' } };
        html2pdf().set(opt).from(element).save();
    }

    function switchTab(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    window.onload = syncSaaS;
</script>
</body>
</html>
