<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0F1B42">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CHYC MEAL">
<title>CHYC-MEAL ERP v2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1A2A5E;--navy-d:#0F1B42;--navy-m:#243470;
  --gold:#B8972A;--gold-l:#D4AF45;
  --steel:#6E8CB5;--steel-l:#A8C0D8;
  --bg:#EEF2FA;--card:#fff;
  --ok:#1A7A4A;--ok-bg:#E8F5EE;
  --warn:#C07A10;--warn-bg:#FEF3E2;
  --err:#C0281A;--err-bg:#FDE8E6;
  --r:14px;--r2:8px;
  --sh:0 2px 16px rgba(26,42,94,.10);
  --sh2:0 8px 32px rgba(26,42,94,.18);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--navy);min-height:100vh;overflow-x:hidden}

/* ── HEADER ── */
.hdr{background:linear-gradient(135deg,var(--navy-d),var(--navy-m));position:sticky;top:0;z-index:200;box-shadow:0 2px 20px rgba(0,0,0,.3)}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;padding:10px 14px}
.hdr-brand{display:flex;align-items:center;gap:10px}
.hdr-logo{width:36px;height:36px;border-radius:8px;object-fit:contain;background:#fff;padding:3px;flex-shrink:0}
.hdr-title .name{font-size:14px;font-weight:800;color:#fff;letter-spacing:-.3px}
.hdr-title .sub{font-size:9px;color:var(--steel-l);font-weight:300}
.hdr-actions{display:flex;gap:7px}
.hdr-btn{width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,.12);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;transition:.2s}
.hdr-btn:active{background:rgba(255,255,255,.25)}

/* STATUS BAR */
.status-bar{background:rgba(0,0,0,.25);padding:5px 14px;display:flex;align-items:center;justify-content:space-between}
.s-pill{display:flex;align-items:center;gap:5px;font-size:10px;color:#fff;font-weight:500}
.s-dot{width:7px;height:7px;border-radius:50%}
.s-dot.live{background:#4ADE80;animation:pulse 2s infinite}
.s-dot.off{background:#FCA5A5}
.s-dot.load{background:#FCD34D;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}

/* TABS */
.tabs{display:flex;background:var(--card);border-bottom:1px solid rgba(26,42,94,.08);overflow-x:auto;scrollbar-width:none;position:sticky;top:82px;z-index:100;box-shadow:0 2px 8px rgba(26,42,94,.06)}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:11px 13px;font-size:11px;font-weight:600;cursor:pointer;color:#6B7A9B;border-bottom:2px solid transparent;transition:.2s;white-space:nowrap}
.tab.active{color:var(--navy);border-bottom-color:var(--gold)}

/* SCROLL */
.scroll{padding:14px;padding-bottom:90px}
.tab-c{display:none}.tab-c.active{display:block}

/* LABELS */
.lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--steel);margin:18px 0 10px;display:flex;align-items:center;gap:8px}
.lbl::after{content:'';flex:1;height:1px;background:rgba(26,42,94,.1)}

/* HERO */
.hero{background:linear-gradient(135deg,var(--navy-d),var(--navy-m) 60%,#3A5898);border-radius:var(--r);padding:18px;color:#fff;margin-bottom:14px;position:relative;overflow:hidden;box-shadow:var(--sh2)}
.hero::before{content:'';position:absolute;right:-40px;top:-40px;width:180px;height:180px;border-radius:50%;background:rgba(184,151,42,.12)}
.hero-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;position:relative;z-index:1}
.hero-logo{width:44px;height:44px;border-radius:10px;background:#fff;padding:4px;object-fit:contain}
.hero-title{font-size:15px;font-weight:800}
.hero-sub{font-size:10px;opacity:.7;margin-top:2px}
.hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;position:relative;z-index:1}
.hero-stat .val{font-size:21px;font-weight:800;font-family:'DM Mono',monospace;color:var(--gold-l)}
.hero-stat .lbl2{font-size:9px;opacity:.65;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
.kpi{background:var(--card);border-radius:var(--r);padding:14px;box-shadow:var(--sh);position:relative;overflow:hidden;animation:fadeUp .4s ease both}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.c1::before{background:var(--navy)}.kpi.c2::before{background:var(--gold)}
.kpi.c3::before{background:var(--steel)}.kpi.c4::before{background:var(--ok)}
.kpi-icon{font-size:26px;opacity:.1;position:absolute;right:10px;bottom:6px}
.kpi-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#6B7A9B}
.kpi-val{font-size:24px;font-weight:800;font-family:'DM Mono',monospace;margin:4px 0 2px}
.kpi-val.navy{color:var(--navy)}.kpi-val.gold{color:var(--gold)}.kpi-val.steel{color:var(--steel)}.kpi-val.green{color:var(--ok)}
.kpi-sub{font-size:10px;color:#8A9ABB}

/* PANEL */
.panel{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:12px}
.panel-hd{display:flex;align-items:center;justify-content:space-between;padding:13px 15px 9px}
.panel-title{font-size:13px;font-weight:700}
.panel-body{padding:0 15px 13px}

/* MODULES */
.mod-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:4px}
.mod{background:var(--card);border-radius:10px;padding:10px 5px;text-align:center;box-shadow:var(--sh);cursor:pointer;transition:.15s;border:1.5px solid transparent}
.mod:active{transform:scale(.93)}.mod.active{border-color:var(--gold)}
.mod-icon{font-size:20px;margin-bottom:3px}.mod-name{font-size:9px;font-weight:700;color:var(--navy)}
.mod-num{font-size:14px;font-weight:800;font-family:'DM Mono',monospace;color:var(--gold)}

/* PROGRESS */
.prog-row{margin-bottom:11px}
.prog-lbl{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;font-weight:500}
.prog-bar{height:6px;background:var(--bg);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}

/* SUBMISSION ITEMS */
.sub-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid rgba(26,42,94,.05)}
.sub-item:last-child{border-bottom:none}
.sub-av{width:34px;height:34px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px}
.sub-info{flex:1;min-width:0}
.sub-title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sub-meta{font-size:10px;color:#8A9ABB;margin-top:2px}

/* PILLS */
.pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700}
.pill-ok{background:var(--ok-bg);color:var(--ok)}.pill-warn{background:var(--warn-bg);color:var(--warn)}
.pill-navy{background:rgba(26,42,94,.1);color:var(--navy)}.pill-gold{background:rgba(184,151,42,.12);color:var(--gold)}
.pill-err{background:var(--err-bg);color:var(--err)}

/* FORM INPUTS */
.fg{margin-bottom:12px}
.fl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#6B7A9B;margin-bottom:5px;display:block}
.fi{width:100%;padding:10px 12px;border:1.5px solid rgba(26,42,94,.15);border-radius:var(--r2);font-size:13px;font-family:'Sora',sans-serif;color:var(--navy);background:var(--bg);transition:.2s}
.fi:focus{outline:none;border-color:var(--navy);background:#fff}
.fi.mono{font-family:'DM Mono',monospace;font-size:12px}

/* BUTTONS */
.btn{padding:11px 18px;border-radius:var(--r2);font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:'Sora',sans-serif;transition:.2s;width:100%;text-align:center;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px}
.btn:active{transform:scale(.98)}
.btn-navy{background:var(--navy);color:#fff}.btn-navy:active{background:var(--navy-m)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-l));color:#fff}
.btn-ok{background:var(--ok);color:#fff}
.btn-out{background:transparent;border:1.5px solid rgba(26,42,94,.2);color:var(--navy)}

/* ALERTS */
.alert{display:flex;gap:9px;padding:11px 13px;border-radius:var(--r2);font-size:11.5px;margin-bottom:10px;border-left:3px solid}
.alert-icon{font-size:15px;flex-shrink:0;margin-top:1px}
.alert-ok{background:var(--ok-bg);border-color:var(--ok);color:var(--ok)}
.alert-warn{background:var(--warn-bg);border-color:var(--warn);color:var(--warn)}
.alert-info{background:rgba(26,42,94,.06);border-color:var(--navy);color:var(--navy)}
.alert-err{background:var(--err-bg);border-color:var(--err);color:var(--err)}

/* BOX */
.box{background:var(--card);border-radius:var(--r);padding:15px;box-shadow:var(--sh);margin-bottom:12px}
.box h3{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:7px}

/* TABLE */
.dtbl{width:100%;border-collapse:collapse;font-size:11px}
.dtbl th{background:var(--bg);padding:8px 9px;text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:#6B7A9B;font-weight:700}
.dtbl td{padding:9px 9px;border-bottom:1px solid rgba(26,42,94,.05)}
.dtbl tr:last-child td{border-bottom:none}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--card);border-top:1px solid rgba(26,42,94,.08);display:flex;padding:6px 0 calc(6px + env(safe-area-inset-bottom));box-shadow:0 -4px 20px rgba(26,42,94,.10)}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;color:#9AA5BE;transition:.2s}
.bn.active{color:var(--navy)}.bn-icon{font-size:19px}.bn-lbl{font-size:9px;font-weight:600}
.bn-fab{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-l));display:flex;align-items:center;justify-content:center;font-size:22px;margin-top:-16px;box-shadow:0 4px 16px rgba(184,151,42,.5);cursor:pointer;transition:.2s;flex-shrink:0}
.bn-fab:active{transform:scale(.92)}

/* SPINNER */
.spin{width:20px;height:20px;border:3px solid rgba(26,42,94,.15);border-top-color:var(--navy);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.kpi:nth-child(1){animation-delay:.05s}.kpi:nth-child(2){animation-delay:.1s}
.kpi:nth-child(3){animation-delay:.15s}.kpi:nth-child(4){animation-delay:.2s}

/* EMPTY */
.empty{text-align:center;padding:28px 16px;color:#8A9ABB}
.empty-icon{font-size:36px;margin-bottom:8px;opacity:.4}
.empty-txt{font-size:13px;font-weight:600}.empty-sub{font-size:11px;margin-top:4px}

/* INSTALL BANNER */
.inst{background:linear-gradient(135deg,var(--gold),var(--gold-l));border-radius:var(--r);padding:13px 15px;display:flex;align-items:center;gap:10px;margin-bottom:12px;cursor:pointer;box-shadow:0 4px 16px rgba(184,151,42,.35)}

/* SECTOR DETAIL */
.sec-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:10px;overflow:hidden}
.sec-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 15px 8px}
.sec-body{padding:0 15px 12px}


/* ── RAPPORT STRIP ── */
.rap-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.rap-btn{border:none;border-radius:var(--r2);padding:11px 6px;font-family:'Sora',sans-serif;font-size:10px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:.2s;color:#fff;line-height:1.3}
.rap-btn:active{transform:scale(.95)}
.rap-btn .rb-icon{font-size:20px}
.rap-btn.rb-navy{background:var(--navy)}
.rap-btn.rb-gold{background:linear-gradient(135deg,var(--gold),var(--gold-l))}
.rap-btn.rb-ok{background:var(--ok)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(26,42,94,.15);border-radius:2px}
</style>
</head>
