<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0F1B42">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CHYC MEAL">
<title>CHYC-MEAL ERP Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0F1B42;--navy2:#1A2A5E;--navy3:#243470;
  --gold:#B8972A;--gold2:#D4AF45;
  --steel:#6E8CB5;--bg:#EEF2FA;--card:#fff;
  --ok:#10B981;--err:#EF4444;--warn:#F59E0B;
  --r:14px;--r2:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--navy);min-height:100vh}

/* HEADER */
.hdr{background:linear-gradient(135deg,var(--navy),var(--navy3));padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 3px 20px rgba(0,0,0,.35)}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-name{font-size:13px;font-weight:800;color:#fff}
.hdr-sub{font-size:9px;color:rgba(255,255,255,.6);margin-top:1px}
.sync-btn{font-size:11px;font-weight:700;padding:7px 14px;border-radius:20px;border:none;background:#334155;color:#fff;cursor:pointer;transition:.2s;white-space:nowrap}
.sync-btn.ok{background:var(--ok)}.sync-btn.err{background:var(--err)}.sync-btn.loading{background:var(--warn)}

/* FILTER BAR */
.fbar{background:var(--navy2);padding:10px 14px;display:grid;grid-template-columns:1fr;gap:10px}
.fbar select{background:var(--navy3);color:#fff;border:1.5px solid var(--gold);padding:9px 10px;border-radius:8px;font-size:12px;font-family:'Sora',sans-serif;width:100%}

/* MAIN */
.main{padding:14px;max-width:960px;margin:0 auto}

/* ACTIONS */
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 10px;border-radius:var(--r2);border:none;font-family:'Sora',sans-serif;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;transition:.15s}
.btn-kobo{background:var(--gold);color:var(--navy)}
.btn-pdf{background:var(--navy2);color:#fff}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.kpi{background:var(--card);border-radius:var(--r);padding:16px 14px;border-bottom:3px solid #E2E8F0;box-shadow:0 2px 12px rgba(26,42,94,.07)}
.kpi-val{font-size:1.5rem;font-weight:800;font-family:'DM Mono',monospace;line-height:1;display:block;margin-bottom:4px}
.kpi-lbl{font-size:10px;color:#64748B;font-weight:600;text-transform:uppercase;letter-spacing:.5px}

/* CHART */
.chart-card{background:var(--card);border-radius:var(--r);padding:14px;margin-bottom:14px;box-shadow:0 2px 12px rgba(26,42,94,.07)}
.chart-wrap{height:200px;position:relative}

/* TABLE */
.tbl-card{background:var(--card);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.tbl-hdr{background:var(--navy2);display:grid;grid-template-columns:1.2fr 1fr 0.7fr 0.7fr}
.tbl-hdr span{padding:9px 10px;font-size:9px;font-weight:700;color:rgba(255,255,255,.85)}
.tbl-row{display:grid;grid-template-columns:1.2fr 1fr 0.7fr 0.7fr;border-bottom:1px solid #F1F5F9}
.tbl-row span{padding:10px 10px;font-size:11px;color:var(--navy)}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-left">
    <div style="background:white; color:#0F1B42; padding:5px; border-radius:5px; font-weight:900;">CHYC</div>
    <div>
      <div class="hdr-name">CHYC CONSULTING</div>
      <div class="hdr-sub">MEAL ERP Pro · Dashboard Live</div>
    </div>
  </div>
  <button class="sync-btn" id="syncBtn" onclick="fetchData()">🔄 SYNC</button>
</header>

<div class="fbar">
  <select id="fSect" onchange="render()">
    <option value="ALL">📂 Tous les secteurs</option>
    <option value="sante">🏥 Santé</option>
    <option value="agriculture">🌾 Agriculture</option>
    <option value="microfinance">💰 Microfinance</option>
    <option value="protection">🛡️ Protection</option>
  </select>
</div>

<div class="main">
  <div class="actions">
    <a href="https://ee.kobotoolbox.org/x/aL4EkYb8XAiZW5oTHBbCFK" target="_blank" class="btn btn-kobo">➕ Nouvelle collecte</a>
    <button onclick="window.print()" class="btn btn-pdf">📄 Rapport PDF</button>
  </div>

  <div class="kpi-grid">
    <div class="kpi"><span class="kpi-val" id="vBen" style="color:var(--navy2)">0</span><span class="kpi-lbl">👥 Bénéficiaires</span></div>
    <div class="kpi"><span class="kpi-val" id="vGen" style="color:#DB2777">0%</span><span class="kpi-lbl">♀ Part femmes</span></div>
    <div class="kpi"><span class="kpi-val" id="vCash" style="color:var(--ok)">0 F</span><span class="kpi-lbl">💵 Dépenses</span></div>
    <div class="kpi"><span class="kpi-val" id="vAct" style="color:var(--gold)">0</span><span class="kpi-lbl">📋 Missions</span></div>
  </div>

  <div class="chart-card">
    <div class="chart-wrap"><canvas id="myChart"></canvas></div>
  </div>

  <div class="tbl-card">
    <div class="tbl-hdr"><span>Agent</span><span>Secteur</span><span>Bénéf.</span><span>Dépense</span></div>
    <div id="tblBody"></div>
  </div>
</div>

<script>
// ══ CONFIGURATION SÉCURISÉE ══
const ASSET_ID = 'aL4EkYb8XAiZW5oTHBbCFK'; 
const API_TOKEN = '421c81d9ac9d00f49953d2e903d8080ab9b274bd';
const PROXY = 'https://api.allorigins.win/get?url=';

let rawData = [];
let myChart = null;

async function fetchData() {
    const btn = document.getElementById('syncBtn');
    btn.textContent = '⌛ Connexion...';
    btn.className = 'sync-btn loading';

    // Utilisation du proxy pour éviter le blocage CORS sur GitHub
    const targetUrl = `https://kf.kobotoolbox.org/api/v2/assets/${ASSET_ID}/data.json`;
    const finalUrl = PROXY + encodeURIComponent(targetUrl) + '&t=' + Date.now();
    
    try {
        const response = await fetch(finalUrl);
        const outerData = await response.json();
        
        // AllOrigins encapsule la réponse dans "contents"
        const data = JSON.parse(outerData.contents);
        
        if (!data.results) throw new Error('Données introuvables');
        
        rawData = data.results;
        btn.textContent = '✅ ' + rawData.length + ' missions';
        btn.className = 'sync-btn ok';
        render();
    } catch (error) {
        console.error(error);
        btn.textContent = '❌ Erreur Sync';
        btn.className = 'sync-btn err';
    }
}

function render() {
    const sFilter = document.getElementById('fSect').value;
    const data = sFilter === 'ALL' ? rawData : rawData.filter(r => r.secteur_projet === sFilter);

    let benH=0, benF=0, cash=0;
    const tbody = document.getElementById('tblBody');
    tbody.innerHTML = '';

    data.forEach(r => {
        const bh = Number(r.nb_beneficiaires_h || 0);
        const bf = Number(r.nb_beneficiaires_f || 0);
        const mnt = Number(r.montant_depense || 0);
        
        benH += bh;
        benF += bf;
        cash += mnt;

        tbody.innerHTML += `
            <div class="tbl-row">
                <span>${r.nom_agent || 'Anonyme'}</span>
                <span>${r.secteur_projet || '-'}</span>
                <span>${bh + bf}</span>
                <span>${mnt.toLocaleString()} F</span>
            </div>`;
    });

    const total = benH + benF;
    document.getElementById('vBen').textContent = total.toLocaleString();
    document.getElementById('vGen').textContent = total > 0 ? Math.round((benF/total)*100) + '%' : '0%';
    document.getElementById('vCash').textContent = cash.toLocaleString() + ' F';
    document.getElementById('vAct').textContent = data.length;

    updateChart(data);
}

function updateChart(data) {
    const ctx = document.getElementById('myChart').getContext('2d');
    const counts = {};
    data.forEach(r => { 
        const s = r.secteur_projet || 'Non défini';
        counts[s] = (counts[s] || 0) + 1; 
    });

    if (myChart) myChart.destroy();
    myChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: Object.keys(counts),
            datasets: [{
                data: Object.values(counts),
                backgroundColor: ['#0F1B42', '#B8972A', '#10B981', '#EF4444', '#6E8CB5']
            }]
        },
        options: { 
            maintainAspectRatio: false,
            plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } }
        }
    });
}

window.onload = fetchData;
</script>
</body>
</html>
