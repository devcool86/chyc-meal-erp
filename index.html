<script>
const ASSET_ID = 'aL4EkYb8XAiZW5oTHBbCFK'; 
const TOKEN = '421c81d9ac9d00f49953d2e903d8080ab9b274bd'; 

let rawData = [];
let myChart = null;

async function fetchData() {
    const btn = document.getElementById('syncBtn');
    btn.innerHTML = '⏳...';
    const targetUrl = `https://kf.kobotoolbox.org/api/v2/assets/${ASSET_ID}/data.json`;
    
    try {
        const response = await fetch(targetUrl, {
            method: 'GET',
            headers: { 'Authorization': `Token ${TOKEN}` }
        });
        const content = await response.json();
        if (content.results) {
            rawData = content.results;
            btn.innerHTML = '✅ ' + rawData.length;
            render();
        }
    } catch (e) { btn.innerHTML = '❌ Erreur'; }
}

function render() {
    const pF = document.getElementById('fProj').value;
    const sF = document.getElementById('fSect').value;
    
    const filtered = rawData.filter(r => {
        const matchP = (pF === 'ALL' || (r.code_projet || '').includes(pF));
        const matchS = (sF === 'ALL' || (r.secteur_projet || '').includes(sF));
        return matchP && matchS;
    });

    let bT=0, bF=0, k=0, b=0;
    const tbody = document.getElementById('tblBody');
    tbody.innerHTML = '';

    filtered.forEach((r, idx) => {
        // --- CORRECTION DES NOMS DE COLONNES ICI ---
        const h = parseInt(r.nb_beneficiaires_h || 0); // Lit la colonne Hommes
        const f = parseInt(r.nb_beneficiaires_f || 0); // Lit la colonne Femmes
        const kits = parseInt(r.nb_kits_distribues || 0);
        const depense = parseFloat(r.montant_depense || 0);

        bT += (h + f); 
        bF += f;
        k += kits;
        b += depense;

        if(idx < 6) {
            tbody.innerHTML += `
                <tr>
                    <td>${(r.date_mission || r._submission_time || '').split('T')[0]}</td>
                    <td><b>${r.nom_agent || 'Anonyme'}</b><br>${r.zone_intervention || 'N/A'}</td>
                    <td>${h + f}</td>
                </tr>`;
        }
    });

    document.getElementById('vTotal').textContent = bT.toLocaleString();
    document.getElementById('vKits').textContent = k.toLocaleString();
    document.getElementById('vBudget').textContent = b.toLocaleString() + ' F';
    document.getElementById('vFemmes').textContent = bT > 0 ? Math.round((bF/bT)*100)+'%' : '0%';
    
    updateChart(filtered);
}

function updateChart(data) {
    const ctx = document.getElementById('sectorChart').getContext('2d');
    const s = {}; 
    data.forEach(r => { 
        const v = r.secteur_projet || 'Non défini'; 
        s[v] = (s[v] || 0) + 1; 
    });
    if (myChart) myChart.destroy();
    myChart = new Chart(ctx, { 
        type: 'doughnut', 
        data: { 
            labels: Object.keys(s), 
            datasets: [{ data: Object.values(s), backgroundColor: ['#0F1B42', '#B8972A', '#10B981', '#4F46E5', '#DB2777'] }] 
        }, 
        options: { maintainAspectRatio: false } 
    });
}

window.onload = fetchData;
</script>
