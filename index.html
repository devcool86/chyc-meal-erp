<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImpactERP | CHYC CONSULTING — ERP GCP/MEAL pour l'Afrique de l'Ouest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a2a4a;
    --navy-dark: #0f1d35;
    --navy-mid: #243558;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --cream: #f8f4ee;
    --white: #ffffff;
    --slate: #64748b;
    --success: #2e7d32;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy-dark);
    color: var(--white);
    overflow-x: hidden;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 60px;
    background: rgba(15,29,53,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(201,168,76,0.2);
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .nav-logo img {
    height: 44px;
    filter: brightness(1.1);
  }

  .nav-brand {
    display: flex;
    flex-direction: column;
  }

  .nav-brand .name {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: 0.5px;
  }

  .nav-brand .product {
    font-size: 11px;
    color: var(--gold);
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .nav-links {
    display: flex;
    gap: 36px;
    list-style: none;
  }

  .nav-links a {
    color: rgba(255,255,255,0.75);
    text-decoration: none;
    font-size: 14px;
    font-weight: 400;
    transition: color 0.2s;
    letter-spacing: 0.3px;
  }

  .nav-links a:hover { color: var(--gold); }

  .nav-cta {
    background: var(--gold);
    color: var(--navy-dark);
    border: none;
    padding: 11px 24px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    letter-spacing: 0.3px;
  }

  .nav-cta:hover {
    background: var(--gold-light);
    transform: translateY(-1px);
  }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    position: relative;
    padding: 120px 60px 80px;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 60% at 70% 40%, rgba(36,53,88,0.9) 0%, transparent 70%),
      radial-gradient(ellipse 50% 80% at 10% 80%, rgba(201,168,76,0.08) 0%, transparent 60%),
      linear-gradient(135deg, var(--navy-dark) 0%, var(--navy) 100%);
  }

  .hero-grid {
    position: absolute;
    inset: 0;
    background-image: 
      linear-gradient(rgba(201,168,76,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.05) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse at center, black 20%, transparent 75%);
  }

  .hero-content {
    position: relative;
    max-width: 680px;
    z-index: 2;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(201,168,76,0.15);
    border: 1px solid rgba(201,168,76,0.35);
    color: var(--gold);
    padding: 7px 16px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 28px;
    animation: fadeUp 0.6s ease forwards;
  }

  .hero-badge::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }

  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(40px, 5vw, 64px);
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 24px;
    animation: fadeUp 0.7s ease 0.1s both;
  }

  .hero h1 .highlight {
    color: var(--gold);
    display: block;
  }

  .hero p {
    font-size: 18px;
    line-height: 1.7;
    color: rgba(255,255,255,0.72);
    margin-bottom: 40px;
    font-weight: 300;
    animation: fadeUp 0.7s ease 0.2s both;
  }

  .hero-actions {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    animation: fadeUp 0.7s ease 0.3s both;
  }

  .btn-primary {
    background: var(--gold);
    color: var(--navy-dark);
    padding: 15px 32px;
    border-radius: 8px;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.3px;
  }

  .btn-primary:hover {
    background: var(--gold-light);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(201,168,76,0.35);
  }

  .btn-outline {
    background: transparent;
    color: var(--white);
    padding: 15px 32px;
    border-radius: 8px;
    font-weight: 500;
    font-size: 15px;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.3);
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .btn-outline:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  .hero-visual {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 52%;
    height: 85vh;
    animation: fadeIn 1s ease 0.4s both;
  }

  .hero-card-stack {
    position: relative;
    width: 100%;
    height: 100%;
  }

  .hero-card {
    position: absolute;
    background: rgba(36,53,88,0.85);
    border: 1px solid rgba(201,168,76,0.2);
    backdrop-filter: blur(20px);
    border-radius: 16px;
    padding: 24px;
  }

  .hero-card.main {
    width: 80%;
    top: 50%;
    left: 10%;
    transform: translateY(-50%);
    box-shadow: 0 40px 100px rgba(0,0,0,0.5);
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .card-status {
    background: rgba(46,125,50,0.2);
    color: #66bb6a;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 100px;
    font-weight: 600;
  }

  .metric-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  .metric-box {
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
  }

  .metric-value {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--gold);
    display: block;
    margin-bottom: 4px;
  }

  .metric-label {
    font-size: 10px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .progress-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .progress-item {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .progress-label {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    width: 80px;
    flex-shrink: 0;
  }

  .progress-bar-bg {
    flex: 1;
    height: 5px;
    background: rgba(255,255,255,0.1);
    border-radius: 100px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 100px;
    animation: growBar 1.5s ease 0.8s both;
    transform-origin: left;
  }

  @keyframes growBar {
    from { transform: scaleX(0); }
    to { transform: scaleX(1); }
  }

  .progress-pct {
    font-size: 11px;
    color: var(--gold);
    width: 32px;
    text-align: right;
    font-weight: 600;
  }

  .hero-card.mini {
    width: 200px;
    padding: 16px;
  }

  .hero-card.mini-1 {
    top: 15%;
    right: 5%;
    animation: float1 4s ease-in-out infinite;
  }

  .hero-card.mini-2 {
    bottom: 20%;
    right: 8%;
    animation: float2 5s ease-in-out infinite;
  }

  @keyframes float1 {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  @keyframes float2 {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(8px); }
  }

  .mini-icon {
    font-size: 24px;
    margin-bottom: 8px;
    display: block;
  }

  .mini-title {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .mini-value {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--white);
    font-weight: 700;
  }

  .mini-sub {
    font-size: 11px;
    color: #66bb6a;
    margin-top: 2px;
  }

  /* STATS STRIP */
  .stats-strip {
    background: rgba(201,168,76,0.08);
    border-top: 1px solid rgba(201,168,76,0.15);
    border-bottom: 1px solid rgba(201,168,76,0.15);
    padding: 30px 60px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
  }

  .stat-item {
    text-align: center;
    padding: 0 20px;
    position: relative;
  }

  .stat-item:not(:last-child)::after {
    content: '';
    position: absolute;
    right: 0;
    top: 10%;
    height: 80%;
    width: 1px;
    background: rgba(201,168,76,0.2);
  }

  .stat-number {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 900;
    color: var(--gold);
    display: block;
    margin-bottom: 6px;
  }

  .stat-desc {
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    line-height: 1.4;
  }

  /* SECTIONS */
  section {
    padding: 100px 60px;
  }

  .section-tag {
    display: inline-block;
    color: var(--gold);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 3.5vw, 44px);
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 16px;
  }

  .section-desc {
    font-size: 17px;
    color: rgba(255,255,255,0.6);
    line-height: 1.7;
    font-weight: 300;
    max-width: 600px;
  }

  /* MODULES */
  .modules-section {
    background: var(--navy);
  }

  .modules-header {
    max-width: 700px;
    margin: 0 auto 70px;
    text-align: center;
  }

  .modules-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .module-card {
    background: rgba(15,29,53,0.8);
    border: 1px solid rgba(201,168,76,0.12);
    border-radius: 16px;
    padding: 32px;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .module-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .module-card:hover {
    transform: translateY(-6px);
    border-color: rgba(201,168,76,0.35);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  .module-card:hover::before {
    opacity: 1;
  }

  .module-icon {
    font-size: 36px;
    margin-bottom: 16px;
    display: block;
  }

  .module-name {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 10px;
    color: var(--white);
  }

  .module-desc {
    font-size: 14px;
    color: rgba(255,255,255,0.55);
    line-height: 1.6;
    margin-bottom: 16px;
  }

  .module-features {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .module-features li {
    font-size: 13px;
    color: rgba(255,255,255,0.65);
    padding-left: 18px;
    position: relative;
  }

  .module-features li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--gold);
  }

  /* PRICING */
  .pricing-section {
    background: var(--navy-dark);
  }

  .pricing-header {
    text-align: center;
    max-width: 600px;
    margin: 0 auto 60px;
  }

  .pricing-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    max-width: 1000px;
    margin: 0 auto;
  }

  .price-card {
    background: rgba(36,53,88,0.5);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 20px;
    padding: 36px 30px;
    text-align: center;
    position: relative;
    transition: all 0.3s;
  }

  .price-card.featured {
    background: linear-gradient(145deg, rgba(201,168,76,0.12), rgba(36,53,88,0.9));
    border-color: var(--gold);
    transform: scale(1.04);
    box-shadow: 0 30px 80px rgba(201,168,76,0.15);
  }

  .price-badge {
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--gold);
    color: var(--navy-dark);
    font-size: 11px;
    font-weight: 700;
    padding: 5px 16px;
    border-radius: 100px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .plan-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .plan-price {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    font-weight: 900;
    color: var(--white);
    margin-bottom: 4px;
  }

  .plan-unit {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 28px;
  }

  .plan-features {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 28px;
    text-align: left;
  }

  .plan-features li {
    font-size: 14px;
    color: rgba(255,255,255,0.7);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .plan-features li .check {
    color: var(--gold);
    font-size: 14px;
    flex-shrink: 0;
  }

  .plan-btn {
    width: 100%;
    padding: 13px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid rgba(201,168,76,0.4);
    background: transparent;
    color: var(--gold);
    transition: all 0.2s;
  }

  .plan-btn.primary-btn {
    background: var(--gold);
    color: var(--navy-dark);
    border-color: var(--gold);
  }

  .plan-btn:hover {
    background: var(--gold);
    color: var(--navy-dark);
  }

  /* OHADA BADGE */
  .compliance-bar {
    background: rgba(36,53,88,0.6);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 12px;
    padding: 20px 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    max-width: 900px;
    margin: 60px auto 0;
    flex-wrap: wrap;
  }

  .compliance-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    color: rgba(255,255,255,0.7);
  }

  .compliance-item span:first-child {
    font-size: 20px;
  }

  .compliance-item strong {
    color: var(--gold);
  }

  /* FOOTER */
  footer {
    background: rgba(0,0,0,0.4);
    border-top: 1px solid rgba(201,168,76,0.15);
    padding: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 30px;
  }

  .footer-brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .footer-brand img { height: 48px; filter: brightness(1.1); }

  .footer-text {
    max-width: 400px;
  }

  .footer-text h3 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    margin-bottom: 6px;
  }

  .footer-text p {
    font-size: 13px;
    color: rgba(255,255,255,0.45);
    line-height: 1.6;
  }

  .footer-tagline {
    font-size: 12px;
    color: var(--gold);
    font-style: italic;
    margin-top: 4px;
  }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* CTA SECTION */
  .cta-section {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-dark) 100%);
    border-top: 1px solid rgba(201,168,76,0.15);
    text-align: center;
    padding: 100px 60px;
  }

  .cta-section h2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(30px, 4vw, 50px);
    margin-bottom: 20px;
    max-width: 700px;
    margin-left: auto;
    margin-right: auto;
  }

  .cta-section p {
    font-size: 17px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 40px;
    font-weight: 300;
  }

</style>
</head>
<body>

<!-- NAVIGATION -->
