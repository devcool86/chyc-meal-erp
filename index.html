<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>CHYC-MEAL ERP v6.0</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #1A2A5E; --gold: #B8972A; --bg: #EEF2FA; --card: #fff; --red: #ef4444; }
        body { margin: 0; font-family: 'Sora', sans-serif; background: var(--bg); color: var(--navy); }
        header { background: #0F1B42; color: #fff; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        #sync-status { font-size: 0.6rem; font-weight: 800; padding: 5px 10px; border-radius: 20px; background: rgba(255,255,255,0.1); }
        
        /* Filtres */
        .filter-bar { background: var(--navy); padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; position: sticky; top: 55px; z-index: 90; }
        select { background: #243470; color: white; border: 1px solid var(--gold); padding: 8px; border-radius: 8px; font-size: 0.7rem; outline: none; }
        
        .container { padding: 15px; max-width: 800px; margin: 0 auto; }
        .kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .kpi-card { background: var(--card); padding: 15px; border-radius: 12px; border-left: 4px solid var(--gold); position: relative; }
        .kpi-val { display: block; font-size: 1.1rem; font-weight: 800; }
        
        /* Alerte Budget */
        .alert-active { border-left-color: var(--red) !important; animation: pulse 2s infinite; }
        .alert-label { color: var(--red) !important; font-weight: 800; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .chart-container { height: 200px; width: 100%; }
        table { width: 100%; border-collapse: collapse; font-size: 0.7rem; }
        td { padding: 8px 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:8px;">
        <div style="background:var(--gold); color:#000; padding:5px 8px; border-radius:5px; font-weight:800;">CH</div>
        <span style="font-weight:800; font-size:0.8rem;">CHYC-MEAL 6.0</span>
    </div>
    <div id="sync-status">CHARGEMENT...</div>
</header>

<div class="filter-bar">
    <select id="filter-projet" onchange="applyFilters()">
        <option value="ALL">TOUS LES PROJETS</option>
    </select>
    <select id="filter-mois" onchange="applyFilters()">
        <option value="ALL">TOUS LES MOIS</option>
        <option value="0">Janvier</option><option value="1">Février</option>
        <option value="2">Mars</option><option value="3">Avril</option>
        <option value="4">Mai</option><option value="5">Juin</option>
        <option value="6">Juillet</option><option value="7">Août</option>
        <option value="8">Septembre</option><option value="9">Octobre</option>
        <option value="10">Novembre</option><option value="11">Décembre</option>
    </select>
</div>

<div class="container">
    <div class="kpi-grid">
        <div class="kpi-card"><span class="kpi-val" id="kpi-ben">0</span><span style="font-size:0.6rem; color:#6E8CB5;">BÉNÉFICIAIRES</span></div>
        <div class="kpi-card"><span class="kpi-val" id="kpi-genre">0%</span><span style="font-size:0.6rem; color:#6E8CB5;">RATIO FEMMES</span></div>
        <div class="kpi-card" id="card-budget">
            <span class="kpi-val" id="kpi-budget">0 F</span>
            <span style="font-size:0.6rem; color:#6E8CB5;" id="lab-budget">BUDGET CONSOMMÉ</span>
        </div>
        <div class="kpi-card"><span class="kpi-val" id="kpi-form">0</span><span style="font-size:0.6rem; color:#6E8CB5;">ACTIVITÉS</span></div>
    </div>

    <div class="card">
        <h2 style="font-size:0.75rem; margin-top:0;">SECTEURS D'INTERVENTION</h2>
        <div class="chart-container"><canvas id="pieChart"></canvas></div>
    </div>

    <div class="card">
        <h2 style="font-size:0.75rem; margin-top:0;">HISTORIQUE FILTRÉ</h2>
        <table><tbody id="table-body"></tbody></table>
    </div>
</div>

<script>
    const ASSET_ID = 'aL4EkYb8XAiZW5oTHBbCFK';
    const SEUIL_BUDGET = 1000000; // Alerte si > 1 million F
    let allData = [];
    let myChart = null;

    async function fetchData() {
        const url = `https://kf.kobotoolbox.org/api/v2/assets/${ASSET_ID}/data.json`;
        try {
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
            const json = await res.json();
            const data = JSON.parse(json.contents);
            allData = data.results;
            
            fillProjectFilter();
            applyFilters();
            document.getElementById('sync-status').innerText = '✅ LIVE';
        } catch (e) {
            document.getElementById('sync-status').innerText = '⚠️ ERREUR';
        }
    }

    function fillProjectFilter() {
        const select = document.getElementById('filter-projet');
        const projets = [...new Set(allData.map(r => r.code_projet || 'AUTRE'))];
        projets.forEach(p => {
            let opt = document.createElement('option');
            opt.value = p; opt.innerText = p.toUpperCase();
            select.appendChild(opt);
        });
    }

    function applyFilters() {
        const projFilter = document.getElementById('filter-projet').value;
        const moisFilter = document.getElementById('filter-mois').value;

        const filtered = allData.filter(r => {
            const date = new Date(r._submission_time);
            const mMatch = moisFilter === 'ALL' || date.getMonth().toString() === moisFilter;
            const pMatch = projFilter === 'ALL' || r.code_projet === projFilter;
            return mMatch && pMatch;
        });

        renderDash(filtered);
    }

    function renderDash(data) {
        let ben = 0, fems = 0, cash = 0, sects = {};
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';

        data.forEach((r, i) => {
            const h = parseInt(r.nb_beneficiaires_h || 0);
            const f = parseInt(r.nb_beneficiaires_f || 0);
            ben += (h + f); fems += f;
            cash += parseInt(r.montant_depense || 0);
            let s = (r.secteur_projet || 'AUTRE').toUpperCase();
            sects[s] = (sects[s] || 0) + 1;

            if(i < 5) {
                tbody.innerHTML += `<tr><td>${new Date(r._submission_time).toLocaleDateString()}</td><td><b>${r.zone_intervention || '-'}</b></td><td style="text-align:right;">${s}</td></tr>`;
            }
        });

        // Mise à jour Chiffres
        document.getElementById('kpi-ben').innerText = ben.toLocaleString();
        document.getElementById('kpi-budget').innerText = cash.toLocaleString() + ' F';
        document.getElementById('kpi-form').innerText = data.length;
        document.getElementById('kpi-genre').innerText = ben > 0 ? Math.round((fems/ben)*100)+'%' : '0%';

        // Alerte Budget
        const cardB = document.getElementById('card-budget');
        const labB = document.getElementById('lab-budget');
        if(cash > SEUIL_BUDGET) {
            cardB.classList.add('alert-active');
            labB.classList.add('alert-label');
            labB.innerText = '⚠️ SEUIL DÉPASSÉ';
        } else {
            cardB.classList.remove('alert-active');
            labB.classList.remove('alert-label');
            labB.innerText = 'BUDGET CONSOMMÉ';
        }

        updateChart(sects);
    }

    function updateChart(sects) {
        const ctx = document.getElementById('pieChart').getContext('2d');
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: Object.keys(sects),
                datasets: [{ data: Object.values(sects), backgroundColor: ['#1A2A5E','#B8972A','#6E8CB5','#A8C0D8','#E2E8F0'] }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } }, cutout: '70%' }
        });
    }

    window.onload = fetchData;
</script>
</body>
</html>
