<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <meta name="theme-color" content="#1A2A5E">
    <title>CHYC-MEAL ERP v4.6</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --navy: #1A2A5E; --gold: #B8972A; --bg: #EEF2FA; --card: #fff; --r: 14px; }
        body { margin: 0; font-family: 'Sora', sans-serif; background: var(--bg); color: var(--navy); }
        header { background: #0F1B42; color: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo-box { display: flex; align-items: center; gap: 10px; }
        .logo-circle { background: var(--gold); color: #0F1B42; padding: 8px; border-radius: 8px; font-weight: 800; }
        #sync-status { font-size: 0.6rem; font-weight: 800; border-radius: 20px; padding: 4px 10px; background: rgba(255,255,255,0.1); }
        .nav-tabs { display: flex; background: var(--navy); padding: 5px; position: sticky; top: 60px; z-index: 90; }
        .tab { flex: 1; text-align: center; padding: 12px; color: #A8C0D8; font-size: 0.75rem; font-weight: 600; cursor: pointer; border-radius: 8px; }
        .tab.active { background: #243470; color: #fff; box-shadow: inset 0 0 0 1px var(--gold); }
        .container { padding: 20px; max-width: 1000px; margin: 0 auto; }
        .kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .kpi-card { background: var(--card); padding: 18px; border-radius: var(--r); border-left: 4px solid var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .kpi-val { display: block; font-size: 1.25rem; font-weight: 800; }
        .kpi-lab { font-size: 0.6rem; color: #6E8CB5; text-transform: uppercase; margin-top: 4px; display: block; }
        .card { background: var(--card); border-radius: var(--r); padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn { background: var(--navy); color: #fff; padding: 14px; border-radius: 12px; font-weight: 700; border: none; cursor: pointer; width: 100%; display: flex; justify-content: center; text-decoration: none; align-items: center; gap: 8px; }
        .btn-pdf { background: #334155; font-size: 0.75rem; margin-bottom: 15px; }
        .chart-box { height: 250px; position: relative; }
        .section { display: none; }
        .section.active { display: block; }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        td { padding: 12px 0; border-bottom: 1px solid #F8FAFC; }
        footer { text-align: center; padding: 30px; font-size: 0.65rem; color: #6E8CB5; }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <div class="logo-circle">CH</div>
        <div>
            <div style="font-weight: 800; font-size: 0.9rem;">CHYC-MEAL</div>
            <div id="sync-status">Initialisation...</div>
        </div>
    </div>
</header>

<div class="nav-tabs">
    <div class="tab active" onclick="switchTab('dash', this)">DASHBOARD</div>
    <div class="tab" onclick="switchTab('data', this)">HISTORIQUE</div>
    <div class="tab" onclick="switchTab('form', this)">COLLECTE</div>
</div>

<div class="container">
    <div id="dash" class="section active">
        <button onclick="genererPDF()" class="btn btn-pdf">📄 GÉNÉRER RAPPORT PDF</button>
        
        <div class="kpi-grid">
            <div class="kpi-card"><span class="kpi-val" id="kpi-ben">0</span><span class="kpi-lab">Bénéficiaires</span></div>
            <div class="kpi-card"><span class="kpi-val" id="kpi-genre">0%</span><span class="kpi-lab">Ratio Femmes</span></div>
            <div class="kpi-card"><span class="kpi-val" id="kpi-budget">0 F</span><span class="kpi-lab">Budget Engagé</span></div>
            <div class="kpi-card"><span class="kpi-val" id="kpi-form">0</span><span class="kpi-lab">Activités</span></div>
        </div>

        <div class="card">
            <h2 style="font-size:0.8rem;">Répartition par Secteur</h2>
            <div class="chart-box"><canvas id="pieChart"></canvas></div>
        </div>
    </div>

    <div id="data" class="section">
        <div class="card">
            <h2 style="font-size:0.8rem;">Derniers Flux Terrain</h2>
            <table><tbody id="table-body"></tbody></table>
        </div>
    </div>

    <div id="form" class="section" style="text-align: center;">
        <div class="card">
            <div style="font-size: 3rem; margin-bottom: 10px;">📡</div>
            <h2>Accès KoboToolbox</h2>
            <a href="https://ee.kobotoolbox.org/x/JA6jKzhp" target="_blank" class="btn" style="background:var(--gold); color:#000;">NOUVEAU RAPPORT</a>
        </div>
    </div>
</div>

<footer>© 2026 CHYC CONSULTING — Saint-Louis, Sénégal</footer>

<script>
    const TOKEN = '421c81d9ac9d00f49953d2e903d8080ab9b274bd';
    const ASSET_ID = 'AnJWsYbZiGvWEz3ZjmwcqY';
    
    async function syncSaaS() {
        const status = document.getElementById('sync-status');
        // Ajout du nocache pour forcer la mise à jour
        const koboUrl = `https://kf.kobotoolbox.org/api/v2/assets/${ASSET_ID}/data.json?nocache=${Date.now()}`;
        
        // On essaie AllOrigins en premier
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(koboUrl)}`;

        try {
            const response = await fetch(proxyUrl);
            const rawData = await response.json();
            const data = JSON.parse(rawData.contents);
            
            if(data && data.results) {
                processData(data.results);
                status.innerText = '✅ CONNECTÉ (LIVE)';
                status.style.color = '#4ade80';
            }
        } catch (e) {
            console.error("Erreur de connexion:", e);
            status.innerText = '⚠️ MODE HORS-LIGNE';
            status.style.color = '#f87171';
        }
    }

    function processData(results) {
        let totalBen = 0, totalF = 0, budget = 0, secteurs = {};
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';

        results.forEach((r, i) => {
            // Mapping basé sur votre XLSForm v2.0
            const benH = parseInt(r.nb_beneficiaires_h || r.nb_apprenants_h || r.nb_consultations || 0);
            const benF = parseInt(r.nb_beneficiaires_f || r.nb_apprenants_f || 0);
            
            totalBen += (benH + benF);
            totalF += benF;
            budget += parseInt(r.montant_depense || 0);
            
            let s = r.secteur_projet || 'Autre';
            secteurs[s] = (secteurs[s] || 0) + 1;

            if(i < 10) {
                tbody.innerHTML += `<tr>
                    <td>${new Date(r._submission_time).toLocaleDateString()}</td>
                    <td><b>${r.zone_intervention || 'N/A'}</b></td>
                    <td style="text-align:right; color:var(--gold)">${s.toUpperCase()}</td>
                </tr>`;
            }
        });

        document.getElementById('kpi-ben').innerText = totalBen.toLocaleString();
        document.getElementById('kpi-budget').innerText = budget.toLocaleString() + ' F';
        document.getElementById('kpi-form').innerText = results.length;
        document.getElementById('kpi-genre').innerText = totalBen > 0 ? Math.round((totalF/totalBen)*100)+'%' : '0%';

        renderPie(secteurs);
    }

    function renderPie(secteurs) {
        const ctx = document.getElementById('pieChart').getContext('2d');
        if(pieChart) pieChart.destroy();
        pieChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: Object.keys(secteurs).map(s => s.toUpperCase()),
                datasets: [{
                    data: Object.values(secteurs),
                    backgroundColor: ['#1A2A5E', '#B8972A', '#6E8CB5', '#A8C0D8', '#E8F5EE']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    async function genererPDF() {
        const element = document.getElementById('dash');
        const btn = document.querySelector('.btn-pdf');
        btn.style.display = 'none';
        const opt = {
            margin: 10,
            filename: 'Rapport_CHYC_MEAL.pdf',
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        try { await html2pdf().set(opt).from(element).save(); } 
        finally { btn.style.display = 'flex'; }
    }

    function switchTab(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    window.onload = syncSaaS;
</script>
</body>
</html>
