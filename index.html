<style>
:root{
  --navy:#0F1B42;--navy2:#1A2A5E;--navy3:#243470;
  --gold:#B8972A;--gold2:#D4AF45;
  --steel:#6E8CB5;--bg:#EEF2FA;--card:#fff;
  --ok:#10B981;--err:#EF4444;--warn:#F59E0B;
  --r:14px;--r2:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--navy);min-height:100vh}

/* HEADER */
.hdr{background:linear-gradient(135deg,var(--navy),var(--navy3));padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 3px 20px rgba(0,0,0,.35)}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-logo{width:38px;height:38px;border-radius:8px;background:#fff;padding:3px;object-fit:contain}
.hdr-name{font-size:13px;font-weight:800;color:#fff}
.hdr-sub{font-size:9px;color:rgba(255,255,255,.6);margin-top:1px}
.sync-btn{font-size:11px;font-weight:700;padding:7px 14px;border-radius:20px;border:none;background:#334155;color:#fff;cursor:pointer;font-family:'Sora',sans-serif;transition:.2s;white-space:nowrap}
.sync-btn.ok{background:var(--ok)}.sync-btn.err{background:var(--err)}.sync-btn.loading{background:var(--warn)}

/* FILTER BAR */
.fbar{background:var(--navy2);padding:10px 14px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fbar select{background:var(--navy3);color:#fff;border:1.5px solid var(--gold);padding:9px 10px;border-radius:8px;font-size:12px;font-family:'Sora',sans-serif;cursor:pointer;width:100%}

/* SECTOR BANNER */
.sect-banner{display:none;padding:8px 16px;font-size:12px;font-weight:700;color:#fff;align-items:center;gap:8px}

/* MAIN */
.main{padding:14px;max-width:960px;margin:0 auto}

/* ACTIONS */
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 10px;border-radius:var(--r2);border:none;font-family:'Sora',sans-serif;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;transition:.15s}
.btn:active{transform:scale(.96)}
.btn-kobo{background:var(--gold);color:var(--navy)}
.btn-pdf{background:var(--navy2);color:#fff}
.btn-3{grid-column:1/-1;background:linear-gradient(135deg,var(--navy),var(--navy3));color:#fff}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.kpi{background:var(--card);border-radius:var(--r);padding:16px 14px;border-bottom:3px solid #E2E8F0;transition:.2s;box-shadow:0 2px 12px rgba(26,42,94,.07)}
.kpi.glow{border-bottom-color:var(--gold);box-shadow:0 4px 20px rgba(184,151,42,.18)}
.kpi-val{font-size:1.5rem;font-weight:800;font-family:'DM Mono',monospace;line-height:1;display:block;margin-bottom:4px}
.kpi-lbl{font-size:10px;color:#64748B;font-weight:600;text-transform:uppercase;letter-spacing:.5px}

/* SECTOR PANEL */
.sect-panel{display:none;background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:16px;box-shadow:0 2px 12px rgba(26,42,94,.07)}
.sect-panel h3{font-size:13px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.sect-inds{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.s-ind{border-radius:10px;padding:12px 10px;text-align:center}
.s-val{font-size:1.1rem;font-weight:800;font-family:'DM Mono',monospace;display:block;margin-bottom:3px}
.s-lbl{font-size:9px;color:#64748B;text-transform:uppercase;letter-spacing:.5px;font-weight:600}

/* CHART */
.chart-card{background:var(--card);border-radius:var(--r);padding:14px;margin-bottom:14px;box-shadow:0 2px 12px rgba(26,42,94,.07)}
.chart-title{font-size:12px;font-weight:700;margin-bottom:10px;color:var(--navy)}
.chart-wrap{height:190px;position:relative}

/* TABLE */
.tbl-card{background:var(--card);border-radius:var(--r);overflow:hidden;margin-bottom:14px;box-shadow:0 2px 12px rgba(26,42,94,.07)}
.tbl-hdr{background:var(--navy2);display:grid;gap:0}
.tbl-hdr span{padding:9px 10px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.85)}
.tbl-row{display:grid;gap:0;border-bottom:1px solid #F1F5F9;transition:.15s}
.tbl-row:last-child{border-bottom:none}
.tbl-row:hover{background:#F8FAFF}
.tbl-row span{padding:10px 10px;font-size:11px;color:var(--navy)}
.tbl-row span b{font-weight:700;display:block}
.tbl-row span small{font-size:9px;color:#94A3B8;margin-top:2px;display:block}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:700}
.b-ok{background:#D1FAE5;color:#065F46}.b-warn{background:#FEF3C7;color:#92400E}.b-info{background:#EEF2FA;color:var(--navy2)}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:#94A3B8}
.empty-i{font-size:2.5rem;margin-bottom:10px}
.empty-t{font-size:14px;font-weight:600;margin-bottom:5px}
.empty-s{font-size:12px}

/* ALERT */
.alert{display:flex;gap:8px;padding:10px 14px;border-radius:var(--r2);font-size:12px;margin-bottom:12px;border-left:3px solid}
.a-info{background:rgba(14,42,94,.06);border-color:var(--navy);color:var(--navy)}
.a-ok{background:#D1FAE5;border-color:var(--ok);color:#065F46}
.a-err{background:#FEE2E2;border-color:var(--err);color:#991B1B}
</style>
</head>

// ══ FETCH ══
async function fetchData() {
  const btn = document.getElementById('syncBtn');
  btn.textContent = '⌛ Chargement...';
  btn.className = 'sync-btn loading';

  const apiURL = `https://kf.kobotoolbox.org/api/v2/assets/${ASSET_ID}/data.json`;

  try {
    const resp = await fetch(PROXY + encodeURIComponent(apiURL) + '&t=' + Date.now());
    const outer = await resp.json();
    const data = JSON.parse(outer.contents);

    if (!data.results) throw new Error('Pas de résultats dans la réponse');

    rawData = data.results;
    btn.textContent = '✅ ' + rawData.length + ' missions';
    btn.className = 'sync-btn ok';
    buildProjectFilter();
    render();
    showAlert('ok', '✅ ' + rawData.length + ' soumissions chargées avec succès');

  } catch(e) {
    btn.textContent = '❌ Erreur';
    btn.className = 'sync-btn err';
    showAlert('err', '❌ Impossible de charger les données. Vérifiez votre connexion internet.');
    console.error('Fetch error:', e);
    // Show demo if no data
    if (rawData.length === 0) loadDemo();
  }
}

// ══ BUILD PROJECT FILTER ══
function buildProjectFilter() {
  const sel = document.getElementById('fProj');
  const projNames = {
    P001:'Marchands Tabliers', P002:'Formation Numérique',
    P003:'Microfinance Saint-Louis', P004:'Santé Communautaire', P005:'Agropastoral Vallée'
  };
  const projs = [...new Set(rawData.map(r => r.code_projet).filter(Boolean))].sort();
  sel.innerHTML = '<option value="ALL">🏢 Tous les projets</option>';
  projs.forEach(p => {
    const name = projNames[p] || p;
    sel.innerHTML += `<option value="${p}">${p} — ${name}</option>`;
  });
}
