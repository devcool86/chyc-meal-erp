<script>
    const ASSET_ID = 'aL4EkYb8XAiZW5oTHBbCFK';
    let myChart = null; // Variable pour le graphique

    async function syncSaaS() {
        const status = document.getElementById('sync-status');
        const koboUrl = `https://kf.kobotoolbox.org/api/v2/assets/${ASSET_ID}/data.json`;
        
        try {
            const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(koboUrl)}`);
            const json = await response.json();
            const rawData = JSON.parse(json.contents);
            
            if(rawData && rawData.results && rawData.results.length > 0) {
                processData(rawData.results);
                status.innerText = '✅ CONNECTÉ';
                status.style.color = '#4ade80';
            } else {
                status.innerText = '✅ CONNECTÉ (VIDE)';
            }
        } catch (e) {
            status.innerText = '⚠️ ERREUR DONNÉES';
            status.style.color = '#f87171';
        }
    }

    function processData(results) {
        let ben = 0, femmes = 0, cash = 0, secteurs = {};
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';

        results.forEach((r, i) => {
            // Calcul des bénéficiaires
            const h = parseInt(r.nb_beneficiaires_h || r.nb_apprenants_h || 0);
            const f = parseInt(r.nb_beneficiaires_f || r.nb_apprenants_f || 0);
            ben += (h + f);
            femmes += f;
            cash += parseInt(r.montant_depense || 0);
            
            // Gestion des secteurs (on prend la valeur brute de Kobo)
            let s = (r.secteur_projet || 'AUTRE').toUpperCase();
            secteurs[s] = (secteurs[s] || 0) + 1;

            // Remplissage de l'historique
            if(i < 10) {
                tbody.innerHTML += `<tr>
                    <td>${new Date(r._submission_time).toLocaleDateString()}</td>
                    <td><b>${r.zone_intervention || 'Zone non définie'}</b></td>
                    <td style="text-align:right; color:var(--gold)">${s}</td>
                </tr>`;
            }
        });

        // Mise à jour des KPIs
        document.getElementById('kpi-ben').innerText = ben.toLocaleString();
        document.getElementById('kpi-budget').innerText = cash.toLocaleString() + ' F';
        document.getElementById('kpi-form').innerText = results.length;
        document.getElementById('kpi-genre').innerText = ben > 0 ? Math.round((femmes/ben)*100)+'%' : '0%';

        // Lancement du graphique
        renderPie(secteurs);
    }

    function renderPie(secteursData) {
        const ctx = document.getElementById('pieChart').getContext('2d');
        
        // On détruit l'ancien graphique s'il existe pour éviter les bugs d'affichage
        if(myChart) { myChart.destroy(); }

        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: Object.keys(secteursData),
                datasets: [{
                    data: Object.values(secteursData),
                    backgroundColor: ['#1A2A5E', '#B8972A', '#6E8CB5', '#A8C0D8', '#E8F5EE'],
                    borderWidth: 2,
                    borderColor: '#ffffff'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { font: { family: 'Sora', size: 10 } }
                    }
                },
                cutout: '70%' // Pour faire un bel anneau
            }
        });
    }

    function switchTab(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    window.onload = syncSaaS;
</script>
